<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Sheet</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="close">
        <button>✕</button>
    </div>

    <h2>LeetCode Tracker</h2>

    <form>

        <label for="question_name">Question Name</label>
        <input 
            type="text" 
            id="question_name"
            placeholder="Example: Two Sum">


        <label for="question_link">Question Link</label>
        <input 
            type="text" 
            id="question_link"
            placeholder="https://leetcode.com/...">


        <label for="difficulty">Difficulty</label>
        <input 
            type="text"
            id="difficulty"
            placeholder="Easy / Medium / Hard">


        <label for="remark">Notes</label>
        <textarea 
            id="remark"
            placeholder="Your approach, tricks, mistakes..."
        ></textarea>

    </form>


    <div class="buttons">
        <button class="cancel">Cancel</button>
        <button class="save">Add to Sheet</button>
    </div>

</div>

<script src="popup.js"></script>
</body>
</html>
